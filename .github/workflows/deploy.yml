name: Test and Deploy LinkForge

on:
  push:
    branches: [ main ]

jobs:
  test-launch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env for testing
        run: cp .env.example .env

      - name: Verify Docker Build
        run: docker compose build

      - name: Verify Application Launch
        run: |
          docker compose up -d
          sleep 10
          
          if [ "$(docker compose ps --filter "status=running" -q)" ]; then
            echo "Application launched successfully!"
            docker compose down
          else
            echo "Application crashed on startup!"
            docker compose logs
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: test-launch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH and Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/LinkForge
            git pull origin main
            docker compose up -d --build